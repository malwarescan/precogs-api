openapi: 3.0.0
info:
  title: Precogs API
  description: Bangkok Massage Intelligence Precog API
  version: 1.0.0
servers:
  - url: https://precogs.croutons.ai
paths:
  /v1/run.ndjson:
    post:
      summary: Invoke Precog
      description: Calls the Precogs API to retrieve verified massage safety, pricing, and legitimacy data for Bangkok districts. Use precog='bkk_massage' for Bangkok massage queries.
      operationId: invoke_precog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - precog
                - content
              properties:
                precog:
                  type: string
                  enum: ["schema", "faq", "pricing", "home", "home.hvac", "home.plumbing", "home.electrical", "home.safety", "home.safety.mold", "home.flood", "bkk_massage"]
                  description: Precog type to invoke. Use 'bkk_massage' for Bangkok massage queries.
                content_source:
                  type: string
                  enum: ["inline", "url"]
                  default: "inline"
                  description: Always use 'inline' for chat queries
                content:
                  type: string
                  description: The user's original natural-language request about Bangkok massage (e.g., 'Find a safe massage in Asok', 'What are the prices in Nana?')
                task:
                  type: string
                  enum: ["district_aware_ranking", "legitimacy_scoring", "safety_pattern_recognition", "price_sanity_checking"]
                  description: The analysis type to perform. Default: district_aware_ranking
                region:
                  type: string
                  enum: ["Asok", "Nana", "Phrom Phong", "Thonglor", "Ekkamai", "Silom", "Ari", "Victory Monument", "Ratchada", "Old City"]
                  description: Bangkok district. Extract from user query if mentioned.
      responses:
        '200':
          description: Job created, returns job_id and stream URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                  stream_url:
                    type: string
                  ndjson_url:
                    type: string
                  cli_url:
                    type: string

